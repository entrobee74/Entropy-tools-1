<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>View Generation — Entropy Tools</title>
<link rel="stylesheet" href="/css/main.css" />
<link rel="stylesheet" href="/css/animations.css" />
<style>
.view-wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px 24px 60px; }
.view-card { width: 100%; max-width: 600px; background: var(--card); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; }
.view-header { background: var(--card2); border-bottom: 1px solid var(--border); padding: 24px 28px; display: flex; align-items: center; justify-content: space-between; }
.view-body { padding: 28px; }
.view-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: .88rem; }
.view-row:last-child { border-bottom: none; }
.view-key { font-family: var(--font-mono); font-size: .65rem; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
.view-val { font-weight: 600; }
.view-actions { padding: 20px 28px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
</style>
</head>
<body>
<div id="page-loader">
  <div class="loader-logo">⚡ ENTROPY TOOLS</div>
  <div class="loader">
    <span class="bar"></span>
    <span class="bar"></span>
    <span class="bar"></span>
  </div>
  <div class="loader-text">loading generation...</div>
</div>
  <div class="loader-text">loading generation...</div>
</div>
<div class="grid-bg"></div>

<nav class="navbar">
  <a href="/index.html" class="nav-logo"><div class="logo-icon">⚡</div>ENTROPY TOOLS</a>
  <div class="nav-right">
    <a href="/auth.html" class="btn btn-gold btn-sm"><span class="blob1"></span><span class="inner">Get Access →</span></a>
  </div>
</nav>

<div class="view-wrap">
  <div id="view-content">
    <div style="text-align:center;padding:60px;color:var(--text3);font-family:var(--font-mono)">
      <div style="font-size:2rem;margin-bottom:16px">⚡</div>
      Loading generation...
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script src="/js/services.js"></script>
<script>
const params    = new URLSearchParams(location.search);
const serviceId = params.get('id');

const service = ET.services.get(serviceId);

document.getElementById('view-content').innerHTML = `
  <div class="view-card fade-up">
    <div class="view-header">
      <div style="display:flex;align-items:center;gap:14px">
        <div style="width:48px;height:48px;background:var(--gold-dim);border:1px solid rgba(245,166,35,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.5rem">${service ? service.icon : '⚡'}</div>
        <div>
          <div style="font-family:var(--font-display);font-weight:700;letter-spacing:1px">${service ? service.name : 'Entropy Tool'}</div>
          <div style="font-family:var(--font-mono);font-size:.65rem;color:var(--text3);margin-top:3px">Generated via Entropy Tools</div>
        </div>
      </div>
      <span class="badge badge-green">✓ Verified</span>
    </div>
    <div class="view-body">
      <div class="view-row"><span class="view-key">Service</span><span class="view-val">${service ? service.name : '—'}</span></div>
      <div class="view-row"><span class="view-key">Category</span><span class="view-val"><span class="badge badge-gold">${service ? service.category : '—'}</span></span></div>
      <div class="view-row"><span class="view-key">Platform</span><span class="view-val">Entropy Tools</span></div>
      <div class="view-row"><span class="view-key">Status</span><span class="view-val"><span style="color:var(--green);display:flex;align-items:center;gap:6px"><span class="glow-dot"></span>Authenticated</span></span></div>
      <div class="view-row"><span class="view-key">Viewed</span><span class="view-val">${new Date().toLocaleString()}</span></div>
    </div>
    <div class="view-actions">
      ${service ? `<a href="${service.repo}" target="_blank" class="btn btn-gold" style="flex:1"><span class="blob1"></span><span class="inner">Open Tool →</span></a>` : ''}
      <button class="btn btn-outline" onclick="copyThisLink()"><span class="blob1"></span><span class="inner">🔗 Copy Link</span></button>
      <a href="/auth.html?mode=register" class="btn btn-ghost"><span class="blob1"></span><span class="inner">Get Access</span></a>
    </div>
  </div>
  <div style="text-align:center;margin-top:20px">
    <div style="font-family:var(--font-mono);font-size:.65rem;color:var(--text3)">Powered by <a href="/index.html" style="color:var(--gold);text-decoration:none">Entropy Tools</a></div>
  </div>`;

function copyThisLink() {
  navigator.clipboard.writeText(window.location.href).catch(() => {});
  ET.ui.toast('Link copied!', 'success');
}
</script>
</body>
</html>
